# Reference snippets for archive reverse proxy (docker-compose.prod.yml:
# front 127.0.0.1:5160, API 127.0.0.1:5060). Production sites often add
# Certbot-managed listen 443/ssl and separate port 80 redirect blocks — merge
# these directives into those server {} blocks, do not replace the whole file.
#
# 413 Request Entity Too Large: nginx default client_max_body_size is 1m.
# After editing: sudo nginx -t && sudo systemctl reload nginx

server {
    server_name archive.hamaprov.net;
    client_max_body_size 0;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://127.0.0.1:5160;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection upgrade;
        proxy_set_header Upgrade $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/archive.hamaprov.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/archive.hamaprov.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    server_name api.archive.hamaprov.net;
    client_max_body_size 0;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://127.0.0.1:5060;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection upgrade;
        proxy_set_header Upgrade $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/archive.hamaprov.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/archive.hamaprov.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
