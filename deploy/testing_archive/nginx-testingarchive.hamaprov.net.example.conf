# Reference for testing reverse proxy (docker-compose.testing.yml:
# front 127.0.0.1:5161, API 127.0.0.1:5061).
#
# TLS: use ONE certificate that lists BOTH names in Subject Alternative Name (SAN).
# If you only issued a cert for testingarchive.hamaprov.net, the API hostname will
# show net::ERR_CERT_COMMON_NAME_INVALID in Chrome.
#
# Issue or expand the cert (both -d on the same certificate line):
#   sudo certbot certonly --nginx -d testingarchive.hamaprov.net -d apitestingarchive.hamaprov.net
# Or add the second name to an existing cert:
#   sudo certbot certonly --nginx --expand -d testingarchive.hamaprov.net -d apitestingarchive.hamaprov.net
#
# Certbot stores the combined cert under the FIRST -d name, e.g.:
#   /etc/letsencrypt/live/testingarchive.hamaprov.net/fullchain.pem
# Point BOTH server {} blocks at that same fullchain.pem + privkey.pem (see below).
#
# Verify what the server sends for the API name:
#   echo | openssl s_client -servername apitestingarchive.hamaprov.net -connect apitestingarchive.hamaprov.net:443 2>/dev/null | openssl x509 -noout -ext subjectAltName
#
# After editing: sudo nginx -t && sudo systemctl reload nginx

server {
    server_name testingarchive.hamaprov.net;
    client_max_body_size 0;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://127.0.0.1:5161;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection upgrade;
        proxy_set_header Upgrade $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/testingarchive.hamaprov.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/testingarchive.hamaprov.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    server_name apitestingarchive.hamaprov.net;
    client_max_body_size 0;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://127.0.0.1:5061;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection upgrade;
        proxy_set_header Upgrade $http_upgrade;
    }

    listen 443 ssl;
    # Same paths as the frontend block when using one multi-domain cert (recommended).
    ssl_certificate /etc/letsencrypt/live/testingarchive.hamaprov.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/testingarchive.hamaprov.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
